<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="blog-post-card">
    
    <img class="post-img" src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg" alt="Beautiful mountain landscape at sunset">
    
    <div class="post-content">
      <h2 class="post-title">Explorando Nuevos Horizontes</h2>
      
      <p class="post-excerpt">
        Descubre los paisajes más impresionantes del mundo y aprende cómo planificar tu próxima aventura de senderismo de manera segura y sostenible.
      </p>
      
      <a href="#" class="read-more">Read More</a>
    </div>

  </div>

</body>
</html>
